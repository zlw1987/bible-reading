services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bible-reading-app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bible-reading-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-bible}
      MYSQL_USER: ${DB_USER:-bible_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bible_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: bible-reading-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-bible_user}
      PMA_PASSWORD: ${DB_PASSWORD:-bible_pass}
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      - db

volumes:
  db_data:
